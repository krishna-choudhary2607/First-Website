<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box {
            border: 2px solid black;
            padding: 20px;
            margin: 20px;
            box-shadow: 5px 5px 15px 1px #000000;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="box">
        i am a box
    </div>
    <div class="box">
        i am also a nice box
    </div>
</body>

</html>
