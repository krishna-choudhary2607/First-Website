<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css boxmodel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .box {
            background-color: aqua;
        }
        .box1 {
            padding: 10px;
            border:2px solid black;
            border-radius: 10px;
            margin: 25px;
            height: 100px;
            width: 90%;
            color: red;
        }
        .box2 {
            color: blue;
            padding: 10px;
            border:2px solid black;
            border-radius: 10px;
            height: 100px;
            width: 90%;
            margin: 25px;
        }
    </style>
</head>

<body>
    <div class="box box1">i am a box</div>
    <div class="box box2">i am a another box</div>
</body>

</html>
